# ╔══════════════════════════════════════════════════════════════╗
# ║  🏰 ASGARD AI PLATFORM — Unified Docker Compose            ║
# ║  Start the entire platform: docker compose up               ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Profiles:
#   default   — Core services (infra + auth + Mimir + Bifrost + Fenrir)
#   full      — Core + OpenEMR/Eir + Eir Gateway
#
# Usage:
#   docker compose up -d                           # Core services
#   docker compose --profile full up -d            # All services + OpenEMR
#   docker compose down                            # Stop all
#
# NOTE: Heimdall (LLM Gateway) runs on HOST because macOS Docker
#       does not support GPU/MLX passthrough.
#       Start it separately: cd ../Heimdall && ./scripts/start.sh
#
# Requires repos cloned side by side:
#   ~/Developer/Asgard/     (this file)
#   ~/Developer/Mimir/
#   ~/Developer/Bifrost/
#   ~/Developer/Fenrir/
#   ~/Developer/Eir/        (OpenEMR fork, optional)

services:

  # ═══════════════════════════════════════
  # 💾 INFRASTRUCTURE
  # ═══════════════════════════════════════

  mariadb:
    image: mariadb:11
    container_name: asgard_mariadb
    restart: unless-stopped
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mimir}
      MYSQL_USER: ${MYSQL_USER:-mimir}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mimir_password}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asgard

  postgres:
    image: postgres:16-alpine
    container_name: asgard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zitadel-secret}
      POSTGRES_DB: zitadel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zitadel"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - asgard

  qdrant:
    image: qdrant/qdrant
    container_name: asgard_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - asgard

  redis:
    image: redis:7-alpine
    container_name: asgard_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - asgard

  neo4j:
    image: neo4j:5-community
    container_name: asgard_neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_BROWSER_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/asgard_neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    networks:
      - asgard

  # ═══════════════════════════════════════
  # 🌳 YGGDRASIL — Auth (Zitadel)
  # ═══════════════════════════════════════

  yggdrasil:
    image: ghcr.io/zitadel/zitadel:v2.71.6
    platform: linux/arm64
    container_name: asgard_yggdrasil
    restart: unless-stopped
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    ports:
      - "${ZITADEL_PORT:-8085}:8080"
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD:-zitadel-secret}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-zitadel-secret}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${ZITADEL_PORT:-8085}
      ZITADEL_FIRSTINSTANCE_ORG_NAME: Asgard
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_EMAIL:-parpol@megawiz.co}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-Asgard2026!}
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-yggdrasil-masterkey-change-me-ok}
      ZITADEL_DEFAULTINSTANCE_LOGINPOLICY_ALLOWREGISTER: "false"
      # 📧 SMTP (Vardr)
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}:${SMTP_PORT:-587}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_USER: ${SMTP_USER:-parpol@megawiz.co}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD: ${SMTP_PASSWORD}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_TLS: "true"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROM: "${SMTP_USER:-parpol@megawiz.co}"
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROMNAME: "Asgard Platform"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - asgard

  # ═══════════════════════════════════════
  # 🧠 MIMIR — Knowledge Platform
  # ═══════════════════════════════════════

  mimir-api:
    build:
      context: ../Mimir
      dockerfile: ro-ai-bridge/Dockerfile
    container_name: asgard_mimir_api
    restart: unless-stopped
    ports:
      - "${MIMIR_API_PORT:-3000}:8080"
    environment:
      PORT: 8080
      DATABASE_URL: mysql://${MYSQL_USER:-mimir}:${MYSQL_PASSWORD:-mimir_password}@mariadb:3306/${MYSQL_DATABASE:-mimir}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-asgard_neo4j_password}
      OLLAMA_API_URL: http://host.docker.internal:${HEIMDALL_PORT:-8080}/v1
      OLLAMA_URL: http://host.docker.internal:${HEIMDALL_PORT:-8080}
      # ── Shared Secrets (from Asgard/.env) ──
      HEIMDALL_API_KEY: ${HEIMDALL_API_KEY:-}
      HEIMDALL_API_URL: http://host.docker.internal:${EMBEDDING_PORT:-8001}/v1
      HEIMDALL_MODEL: ${HEIMDALL_MODEL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_MOUNT: ${VAULT_MOUNT:-}
      VAULT_PATH: ${VAULT_PATH:-}
      EMBED_MODEL: ${MIMIR_EMBED_MODEL:-nomic-embed-text}
      CRON_TICK_SECONDS: ${MIMIR_CRON_TICK_SECONDS:-60}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      mariadb:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - asgard

  mimir-dashboard:
    build:
      context: ../Mimir/ro-ai-dashboard
      dockerfile: Dockerfile
    container_name: asgard_mimir_dashboard
    restart: unless-stopped
    ports:
      - "${MIMIR_DASHBOARD_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://mimir-api:8080
      NEXT_PUBLIC_ZITADEL_URL: http://yggdrasil:8080
    depends_on:
      - mimir-api
    networks:
      - asgard

  # ═══════════════════════════════════════
  # ⚡ BIFROST — Agent Runtime
  # ═══════════════════════════════════════

  bifrost:
    build:
      context: ../Bifrost
      dockerfile: Dockerfile
    container_name: asgard_bifrost
    restart: unless-stopped
    ports:
      - "${BIFROST_PORT:-8100}:8100"
    environment:
      BIFROST_HOST: 0.0.0.0
      BIFROST_PORT: 8100
      HEIMDALL_URL: http://host.docker.internal:${HEIMDALL_PORT:-8080}
      MIMIR_URL: http://mimir-api:8080
      # ── Shared Secrets (from Asgard/.env) ──
      HEIMDALL_API_KEY: ${HEIMDALL_API_KEY:-}
      MIMIR_API_KEY: ${HEIMDALL_API_KEY:-}
      DEFAULT_MODEL: ${BIFROST_DEFAULT_MODEL:-qwen3.5}
      MAX_ITERATIONS: ${BIFROST_MAX_ITERATIONS:-10}
      MAX_EXECUTION_TIME: ${BIFROST_MAX_EXECUTION_TIME:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - mimir-api
    networks:
      - asgard

  # ═══════════════════════════════════════
  # 🐺 FENRIR — Computer-Use Agent
  # ═══════════════════════════════════════

  fenrir:
    build:
      context: ../Fenrir
      dockerfile: Dockerfile
    container_name: asgard_fenrir
    restart: unless-stopped
    ports:
      - "${FENRIR_PORT:-8200}:8200"
    environment:
      FENRIR_HOST: 0.0.0.0
      FENRIR_PORT: 8200
      HEIMDALL_URL: http://host.docker.internal:${HEIMDALL_PORT:-8080}
      OPENEMR_URL: http://eir-gateway:8300
      OPENEMR_FHIR_URL: http://eir-gateway:8300/apis/default/fhir
      # ── Shared Secrets (from Asgard/.env) ──
      HEIMDALL_API_KEY: ${HEIMDALL_API_KEY:-}
      OPENEMR_AUTH_TOKEN: ${OPENEMR_AUTH_TOKEN:-}
      BROWSER_HEADLESS: ${FENRIR_BROWSER_HEADLESS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - bifrost
    networks:
      - asgard

  # ═══════════════════════════════════════
  # 🏥 EIR — OpenEMR (optional: --profile full)
  # ═══════════════════════════════════════

  eir:
    image: openemr/openemr:7.0.2
    container_name: asgard_eir
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${OPENEMR_PORT:-80}:80"
      - "443:443"
    environment:
      MYSQL_HOST: mariadb
      MYSQL_ROOT_PASS: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: openemr
      MYSQL_PASS: ${OPENEMR_MYSQL_PASSWORD:-openemr}
      MYSQL_DATABASE: openemr
      OE_USER: admin
      OE_PASS: ${OPENEMR_ADMIN_PASSWORD:-1qazXSW@}
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ../Eir/eir-chat-inject.conf:/etc/apache2/conf.d/eir-chat-inject.conf:ro
    networks:
      - asgard

  eir-gateway:
    build:
      context: ../Eir
      dockerfile: Dockerfile.gateway
    container_name: asgard_eir_gateway
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${EIR_GATEWAY_PORT:-8300}:8300"
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8300
      OPENEMR_URL: http://eir:80
      AUTH_ENABLED: ${EIR_AUTH_ENABLED:-false}
      AUTH_SECRET: ${EIR_AUTH_SECRET:-dev-secret}
      RATE_LIMIT_RPS: ${EIR_RATE_LIMIT_RPS:-100}
      CACHE_TTL_SECS: ${EIR_CACHE_TTL_SECS:-60}
      TENANT_ID: ${EIR_TENANT_ID:-default}
      BIFROST_URL: http://bifrost:8100
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - eir
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - asgard

  # ═══════════════════════════════════════
  # 🛡️ VÁRÐR — Monitoring Dashboard
  # ═══════════════════════════════════════

  vardr:
    build:
      context: ../Vardr
      dockerfile: Dockerfile
    container_name: asgard_vardr
    restart: unless-stopped
    ports:
      - "${VARDR_PORT:-9090}:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - asgard

# ═══════════════════════════════════════
# 📦 VOLUMES
# ═══════════════════════════════════════

volumes:
  mariadb_data:
    driver: local
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local

# ═══════════════════════════════════════
# 🌐 NETWORK
# ═══════════════════════════════════════

networks:
  asgard:
    name: asgard_network
    driver: bridge
